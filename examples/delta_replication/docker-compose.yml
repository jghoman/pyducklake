services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ducklake
      POSTGRES_PASSWORD: ducklake
      POSTGRES_DB: ducklake
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ducklake"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - ducklake-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - ducklake-net

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/ducklake-target &&
      echo 'Bucket created successfully'
      "
    networks:
      - ducklake-net

  delta-producer:
    build:
      context: ../..
      dockerfile: examples/delta_replication/Dockerfile
    command: python delta_producer.py
    environment:
      DELTA_TABLE_PATH: /data/delta/events
    volumes:
      - delta-data:/data/delta
    restart: on-failure
    networks:
      - ducklake-net

  replicator:
    build:
      context: ../..
      dockerfile: examples/delta_replication/Dockerfile
    command: python replicate_service.py
    environment:
      DELTA_TABLE_PATH: /data/delta/events
      DUCKLAKE_POSTGRES: "postgres:dbname=ducklake host=postgres user=ducklake password=ducklake"
      DUCKLAKE_S3_BUCKET: ducklake-target
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_USE_SSL: "false"
      S3_URL_STYLE: path
    volumes:
      - delta-data:/data/delta
    depends_on:
      delta-producer:
        condition: service_started
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: on-failure
    networks:
      - ducklake-net

volumes:
  delta-data:

networks:
  ducklake-net:
    driver: bridge
