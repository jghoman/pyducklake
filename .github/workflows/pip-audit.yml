# .github/workflows/pip-audit.yml
#
# NOTE: Per supply chain security best practices, replace all @vX.Y.Z tags
# with full 40-character commit SHAs. Find them at:
#   actions/checkout:        https://github.com/actions/checkout/releases
#   pypa/gh-action-pip-audit: https://github.com/pypa/gh-action-pip-audit/releases

name: pip-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly so new CVEs against existing deps are caught
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install .

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: .
