name: Release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-to-test-pypi:
    if: startsWith(github.ref, 'refs/tags/') # Only pubplish to pypi on tag pushes
    needs: build
    runs-on: ubuntu-latest
    environment:
        name: pypi
        url: https://test.pypi.org/p/pyducklake
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-to-pypi:
    if: startsWith(github.ref, 'refs/tags/') # Only pubplish to pypi on tag pushes
    needs: build
    runs-on: ubuntu-latest
    environment:
        name: pypi
        url: https://pypi.org/p/pyducklake
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
